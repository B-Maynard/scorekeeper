<div class="cards-wrapper">
  <div class="header">
    <div class="add-player-container">
      <input class="text-input" placeholder="Add player name..." [(ngModel)]="state.newPlayer"
        (keyup.enter)="addPlayer()" />
      <div class="medium-btn add-player-btn" (click)="addPlayer()">Add Player</div>
    </div>
    <div class="player-count">{{ state.players.length }} players</div>
    <div class="buttons">
      <div class="medium-btn-ghost" ngClass="'{'isDisabled': !history.canUndo()}'" (click)="undo()">Undo</div>
      <div class="medium-btn-danger" (click)="reset()">Reset</div>
    </div>
  </div>

  <div class="grid">
    @for (player of state.players; track $index) {
    <div class="player-card">
      <div class="card-header">
        <div class="score-badge" [id]="'score-' + player.id">{{ player.score }}</div>
        <h3>{{ player.name }}</h3>
      </div>
      <div class="score-row">
        <div class="btn" (click)="minus(player,1)">-1</div>
        <div class="btn" (click)="plus(player,1)">+1</div>

        <input type="number" class="number-input" [(ngModel)]="player.customAmount">
        <div class="btn" (click)="minus(player, player.customAmount)">-</div>
        <div class="btn" (click)="plus(player, player.customAmount)">+</div>

        <div></div>
      </div>

      <label>Notes</label>
      <textarea class="notes-input" rows="3" [(ngModel)]="player.notes" (blur)="updateNotes()"
        placeholder="Any info to remember..."></textarea>

        <div class="small-btn-danger" (click)="removePlayer(player.id)">Remove</div>
    </div>
    }
  </div>
</div>
